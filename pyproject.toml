[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [".build-venv", ".quality-venv", "build", "dist", "release"]

[tool.ruff.lint]
select = ["A", "B", "C4", "E4", "E7", "E9", "F", "I", "PIE", "RUF", "SIM", "UP", "W"]

[tool.ruff.format]
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
pretty = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pytest.ini_options]
addopts = "--strict-config --strict-markers"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["app"]

[tool.coverage.report]
exclude_also = ["if __name__ == .__main__.:"]
fail_under = 70
show_missing = true

[tool.bandit]
exclude_dirs = [".build-venv", ".quality-venv", "build", "dist", "release", "tests"]
skips = ["B104"]

[tool.codespell]
ignore-words-list = "athome,consol,datas,fitz"
skip = ".build-venv,.quality-venv,.security-venv,build,dist,release,*.ico"

[tool.djlint]
profile = "jinja"
ignore = "H015,H020,H021,H031"
