name: Windows package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build and smoke-test executable
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install release and test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-release.txt -r requirements-dev.txt
      - name: Run unit tests
        run: python -m pytest -q
      - name: Build release files
        shell: cmd
        run: build_release.bat
      - name: Smoke-test executable
        shell: pwsh
        run: ./scripts/smoke_test_release.ps1
      - name: Upload tested package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: PDFeditorAthome-v1.0.1-windows-x64
          path: |
            release/PDFeditorAthome-v1.0.1-windows-x64/PDFeditorAthome.exe
            release/PDFeditorAthome-v1.0.1-windows-x64/SHA256SUMS.txt
            release/PDFeditorAthome-v1.0.1-windows-x64.zip
          if-no-files-found: error
          retention-days: 14
