name: Static analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-analysis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - name: Run tests with branch coverage
        run: python -m pytest -q --cov=app --cov-branch --cov-report=term-missing

  quality:
    name: Lint, format, types, and dead code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install quality tools
        run: python -m pip install --disable-pip-version-check -r requirements-quality.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: Mypy type analysis
        run: mypy app.py tests
      - name: HTML template lint
        run: djlint templates --lint
      - name: Spelling
        run: codespell
      - name: High-confidence dead code
        run: vulture app.py --min-confidence 90

  security:
    name: Dependency, source, and workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install security tools
        run: python -m pip install --disable-pip-version-check -r requirements-security.txt
      - name: Audit pinned dependencies
        run: pip-audit --strict --requirement requirements-release.txt
      - name: Bandit Python security analysis
        run: bandit --quiet --recursive --configfile pyproject.toml app.py
      - name: Semgrep Python and JavaScript rules
        run: semgrep scan --config .semgrep.yml --error --metrics=off app.py static/app.js
      - name: Audit GitHub Actions definitions
        run: zizmor --min-severity medium .github/workflows
